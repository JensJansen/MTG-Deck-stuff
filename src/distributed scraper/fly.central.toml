app            = "deck-gen-central"
primary_region = "iad"

auto_stop_machines  = "off"
auto_start_machines = false
min_machines_running = 1

[build]
  dockerfile = "Dockerfile.central"

# NOTE: START_CARD is intentionally NOT defined here. It is set per-machine
# (via `fly machines update <id> -e START_CARD=...`) so that alphabetic
# partitioning survives `fly deploy`. Defining it here would reset every
# machine to the same start point on each deploy.
[env]
  SCRAPER_API_URL        = "http://100.113.155.84:8000"
  ALL_PROXY              = "socks5h://127.0.0.1:1055"
  PYTHONUNBUFFERED       = "1"
  SWEEP_INTERVAL_SECONDS = "3600"

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
